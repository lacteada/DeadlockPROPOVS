name: Daily Video Scrape

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yt-videos-list==0.6.7

      - name: Scrape videos and update videos.json
        run: python scripts/update_videos.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- videos.json; then
            echo "No new videos found. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git commit -m "chore: update videos.json"
          git push
